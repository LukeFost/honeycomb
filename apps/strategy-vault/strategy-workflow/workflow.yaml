# ==========================================================================
# CRE WORKFLOW SETTINGS — StrategyVault swap-execution workflow
# ==========================================================================
# Per-target artifacts. secrets.yaml maps UNISWAP_API_KEY for the live Uniswap
# /quote pull (main.ts:232, Confidential HTTP); config.<target>.json holds the
# per-target vault settings.
# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "strategy-vault-workflow-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "./secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "strategy-vault-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "./secrets.yaml"
