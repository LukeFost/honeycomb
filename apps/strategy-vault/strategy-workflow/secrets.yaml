# Maps a CRE secret id -> the env var holding its value.
# - Local `cre workflow simulate -e <.env>` resolves the value from that env var.
# - For a deployed workflow, `cre secrets create secrets.yaml` encrypts + uploads it to
#   the Vault DON, so DON nodes decrypt it at runtime without exposing it.
secretsNames:
  UNISWAP_API_KEY:
    - UNISWAP_API_KEY
